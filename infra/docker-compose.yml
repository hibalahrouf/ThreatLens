version: "3.9"

services:
  # ─── FastAPI Backend ───
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: masvs-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - masvs-network

  # ─── Celery Worker ───
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: masvs-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info -I app.tasks.scan_tasks
    env_file:
      - ../.env
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
      - ../backend/alembic.ini:/app/alembic.ini
    depends_on:
      - api
      - redis
    restart: unless-stopped
    networks:
      - masvs-network

  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: masvs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - masvs-network

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: masvs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - masvs-network

  # ─── MobSF ───
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: masvs-mobsf
    ports:
      - "8080:8000"
    environment:
      MOBSF_API_KEY: ${MOBSF_API_KEY}
      MOBSF_ANALYZER_IDENTIFIER: host.docker.internal:5555
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - masvs-network
      
  # ─── MinIO (Object Storage) ───
  minio:
    image: minio/minio:latest
    container_name: masvs-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - masvs-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  masvs-network:
    driver: bridge
