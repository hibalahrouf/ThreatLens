name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile Python modules
        run: python -m compileall app
      - name: Validate Alembic migrations
        run: alembic check || alembic heads

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  cli:
    name: CLI checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CLI
        run: pip install -e .[dev]
      - name: Compile CLI modules
        run: python -m compileall masvs_cli

  security-gate:
    name: ThreatLens Security Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ThreatLens stack
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d --build
          sleep 30  # wait for services to be ready

      - name: Install ThreatLens CLI
        run: |
          cd cli
          pip install -e .

      - name: Verify APK integrity
        run: |
          echo "1da8bf57d266109f9a07c01bf7111a1975ce01f190b9d914bcd3ae3dbef96f21  docs/samples/UnCrackable-Level1.apk" | sha256sum -c

      - name: Run Security Gate
        run: |
          threatlens scan run docs/samples/UnCrackable-Level1.apk --project "CI-Security-Gate" --fail-on high

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: threatlens-report.sarif
